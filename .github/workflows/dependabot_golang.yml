name: Dependabot update Go
on: pull_request

permissions:
  contents: write

jobs:
  golang_update:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'ivanvc/dispatcher'
    steps:
    - name: Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v3.0.0
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{github.head_ref}}
      if: contains(steps.metadata.outputs.dependency-names, 'golang')
    - name: Set up Go
      if: contains(steps.metadata.outputs.dependency-names, 'golang')
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'go.mod'
        cache: true
    - name: Bump Golang version
      if: contains(steps.metadata.outputs.dependency-names, 'golang')
      run: |
        go mod edit -toolchain go${{steps.metadata.outputs.new-version}}
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add go.mod
        git commit -m "deps(golang): Bump from ${{steps.metadata.outputs.old-version}} to ${{steps.metadata.outputs.new-version}}"
        git push origin "${{github.head_ref}}"
