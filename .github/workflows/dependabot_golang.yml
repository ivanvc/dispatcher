name: Dependabot update Go
on: pull_request

permissions:
  contents: write

jobs:
  golang_update:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'ivanvc/dispatcher'
    steps:
    - name: Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{github.head_ref}}
      if: contains(steps.metadata.outputs.dependency-names, 'golang')
    - name: Set up Go
      if: contains(steps.metadata.outputs.dependency-names, 'golang')
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: 'go.mod'
        cache: true
    - name: Bump Golang version
      if: contains(steps.metadata.outputs.dependency-names, 'golang')
      run: |
        go mod edit -toolchain go${{steps.metadata.outputs.new-version}}
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add go.mod
        git diff --cached --quiet && exit 0
        git commit -m "deps(golang): Bump from ${{steps.metadata.outputs.old-version}} to ${{steps.metadata.outputs.new-version}}"
        git push origin "${{github.head_ref}}"
